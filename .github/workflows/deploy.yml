name: Deploy Stock History to iwinv

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 코드를 깃허브 공장으로 가져오기 (Checkout)
        uses: actions/checkout@v4

      - name: 2. 깃허브 공장에 Node.js 24버전 설치
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. 의존성 설치 및 Next.js 빌드
        run: |
          npm install
          npx prisma generate
          npm run build
          # standalone 모드: .next/standalone/ 에 실행에 필요한 파일만 묶임
          # 정적 파일을 standalone 디렉토리 안으로 복사 (서버 실행 시 필요)
          cp -r .next/static .next/standalone/.next/static
          cp -r prisma .next/standalone/prisma

      - name: 4. 빌드 결과물 서버로 전송 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: ".next/standalone"
          target: "~/stock-history"
          # node_modules 전송 불필요 — standalone에 필요한 것만 포함됨
          # data/ (SQLite DB) 는 서버 데이터이므로 전송하지 않음

      - name: 5. 서버에서 DB 동기화 및 PM2 재시작
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/stock-history/.next/standalone

            # DB 스키마 동기화 (prisma v6 전역 설치 필요 — 최초 서버 세팅 시 sudo npm install -g prisma@6)
            prisma db push --schema=prisma/schema.prisma

            # 기존 프로세스 재시작, 없으면 신규 시작
            pm2 restart stock-history || PORT=3002 pm2 start server.js --name "stock-history" --cwd ~/stock-history/.next/standalone

            # 재부팅 시 자동 시작 설정 저장
            pm2 save
            pm2 list
